      render() {
        this.container.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
            <div>
              <span class="badge badge-primary">출석부 디자이너</span>
              <h2 style="font-weight:700;">${this.training.title}</h2>
            </div>
            <div style="display:flex; gap:0.5rem;">
              <a href="#/admin" class="btn btn-secondary">대시보드로</a>
              <button class="btn btn-primary" id="btn-save-builder">출석 양식 저장</button>
            </div>
          </div>

          <div class="builder-layout">
            <div class="builder-panel">
              <h3 class="builder-panel-title">필드 모듈 팔레트</h3>
              <p style="font-size:0.75rem; color:var(--text-muted); margin-bottom:1rem;">클릭하여 캔버스 하단에 필드를 배치하세요.</p>
              <div class="builder-palette">
                ${MODULE_TYPES.map(m => `<div class="palette-item" data-type="${m.type}"><span>${m.name}</span></div>`).join('')}
              </div>
            </div>

            <div class="builder-panel" style="flex:2;">
              <h3 class="builder-panel-title">출석부 레이아웃 캔버스</h3>
              <div class="builder-canvas-scroll" id="canvas-dropzone"></div>
            </div>

            <div class="builder-panel">
              <h3 class="builder-panel-title">옵션 상세 구성</h3>
              <div class="builder-settings" id="sidebar-settings">
                <div class="settings-empty">필드를 선택해 옵션을 커스텀하세요.</div>
              </div>
            </div>
          </div>
        `;
        this.canvas = this.container.querySelector('#canvas-dropzone');
        this.sidebar = this.container.querySelector('#sidebar-settings');

        this.bindEvents();
        this.refreshCanvas();
      }
      bindEvents() {
        this.container.querySelectorAll('.palette-item').forEach(item => {
          item.addEventListener('click', () => this.addModule(item.dataset.type));
        });
        this.container.querySelector('#btn-save-builder').addEventListener('click', () => this.save());
      }
      addModule(type) {
        const id = 'mod_' + Date.now() + Math.floor(Math.random()*100);
        let label = '새 필드';
        let extra = {};
        switch (type) {
          case 'signature': label = '자필 서명'; break;
          case 'short_text': label = '단답형 기입란'; extra = { placeholder: '답변 입력' }; break;
          case 'long_text': label = '장문형 기입란'; extra = { placeholder: '상세 내용 입력' }; break;
          case 'number': label = '숫자 입력란'; extra = { placeholder: '숫자만 입력', min: '', max: '' }; break;
          case 'single_select': label = '단일 선택'; extra = { options: ['옵션 1', '옵션 2'] }; break;
          case 'checkbox': label = '체크 항목'; extra = { options: ['동의함'] }; break;
          case 'dropdown': label = '드롭다운'; extra = { options: ['선택 1', '선택 2'] }; break;
          case 'date': label = '날짜 입력'; break;
          case 'time': label = '시간 입력'; break;
          case 'image': label = '안내 이미지 문구'; extra = { src: '' }; break;
          case 'file_download': label = '안내 첨부파일 다운로드'; extra = { fileData: '', fileName: '안내문서.pdf' }; break;
          case 'file_upload': label = '증빙서류 파일 첨부'; extra = {}; break;
          case 'divider': label = '섹션 제목'; break;
          case 'info_text': label = '이곳에 연수 안내글을 적으세요.'; break;
        }

        const newMod = { id, type, label, required: type !== 'divider' && type !== 'info_text' && type !== 'image' && type !== 'file_download', ...extra };
        this.modules.push(newMod);
        this.selectedModuleId = id;
        this.refreshCanvas();
        this.refreshSidebar();
      }
      deleteModule(id, e) {
        if(e) e.stopPropagation();
        this.modules = this.modules.filter(m => m.id !== id);
        if (this.selectedModuleId === id) this.selectedModuleId = null;
        this.refreshCanvas();
        this.refreshSidebar();
      }
      move(idx, dir, e) {
        e.stopPropagation();
        if (dir === 'up' && idx > 0) {
          const t = this.modules[idx]; this.modules[idx] = this.modules[idx-1]; this.modules[idx-1] = t;
        } else if (dir === 'down' && idx < this.modules.length - 1) {
          const t = this.modules[idx]; this.modules[idx] = this.modules[idx+1]; this.modules[idx+1] = t;
        }
        this.refreshCanvas();
      }
      refreshCanvas() {
        this.canvas.innerHTML = '';
        if (this.modules.length === 0) {
          this.canvas.innerHTML = `<div class="canvas-empty-state"><p>양식 요소가 비어있습니다. 왼쪽 팔레트에서 선택해 채워보세요.</p></div>`;
          return;
        }
        this.modules.forEach((mod, idx) => {
          const item = document.createElement('div');
          const active = mod.id === this.selectedModuleId;
          item.className = `builder-item ${active ? 'selected' : ''}`;
          
          let previewHTML = '';
          if (mod.type === 'image' && mod.src) {
            previewHTML = `<img src="${mod.src}" style="max-height:80px; max-width:100%; border:1px solid #ddd; display:block; margin-top:5px; border-radius:4px;">`;
          } else if (mod.type === 'file_download') {
            previewHTML = `<div style="font-size:0.8rem; color:var(--color-primary); margin-top:5px;">📥 다운로드: ${mod.fileName || ''}</div>`;
          } else if (mod.type === 'file_upload') {
            previewHTML = `<div style="font-size:0.8rem; color:var(--text-muted); margin-top:5px;">📎 [사용자 파일 첨부 구역]</div>`;
          }

          item.innerHTML = `
            <div class="builder-item-header">
              <span class="builder-item-title">${mod.type}</span>
              <div class="builder-item-actions">
                <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();" id="up-${mod.id}">▲</button>
                <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();" id="down-${mod.id}">▼</button>
                <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();" id="del-${mod.id}">🗑</button>
              </div>
            </div>
            <div style="font-weight:600; white-space:pre-wrap;">${mod.label || '라벨 없음'} ${mod.required ? '<span style="color:var(--color-danger);">*</span>' : ''}</div>
            ${previewHTML}
          `;
          
          item.addEventListener('click', () => {
            this.selectedModuleId = mod.id;
            this.refreshCanvas();
            this.refreshSidebar();
          });

          this.canvas.appendChild(item);

          item.querySelector(`#up-${mod.id}`).addEventListener('click', (e) => this.move(idx, 'up', e));
          item.querySelector(`#down-${mod.id}`).addEventListener('click', (e) => this.move(idx, 'down', e));
          item.querySelector(`#del-${mod.id}`).addEventListener('click', (e) => this.deleteModule(mod.id, e));
        });
      }
      refreshSidebar() {
        this.sidebar.innerHTML = '';
        if (!this.selectedModuleId) {
          this.sidebar.innerHTML = '<div class="settings-empty">필드를 선택해 옵션을 커스텀하세요.</div>';
          return;
        }
        const mod = this.modules.find(m => m.id === this.selectedModuleId);
        if (!mod) return;

        const isLayout = mod.type === 'divider' || mod.type === 'info_text';
        
        // 1-1. 여러줄 필드 라벨 편집용 textarea 구성
        let html = `
          <div class="form-group">
            <label class="form-label">${isLayout ? '표시 내용' : '필드명 (라벨 여러 줄 가능)'}</label>
            <textarea class="form-control" id="edit-lbl" rows="3">${mod.label || ''}</textarea>
          </div>
        `;

        if (!isLayout && mod.type !== 'image' && mod.type !== 'file_download') {
          html += `
            <div class="form-group">
              <label class="option-control">
                <input type="checkbox" id="edit-req" ${mod.required ? 'checked' : ''}> 필수 기입란
              </label>
            </div>
          `;
        }

        if (mod.type === 'short_text' || mod.type === 'long_text' || mod.type === 'number') {
          html += `
            <div class="form-group">
              <label class="form-label">기본 안내문구(Placeholder)</label>
              <input type="text" class="form-control" id="edit-ph" value="${mod.placeholder || ''}">
            </div>
          `;
        }

        // 이미지 삽입 모듈 설정
        if (mod.type === 'image') {
          html += `
            <div class="form-group">
              <label class="form-label">안내용 이미지 등록 (PNG/JPG)</label>
              <input type="file" accept="image/*" class="form-control" id="edit-img-file">
              ${mod.src ? `<img src="${mod.src}" style="max-width:100%; height:auto; margin-top:0.5rem; max-height:120px; border:1px solid #ddd; border-radius:4px;">` : ''}
            </div>
          `;
        }

        // 관리자 첨부파일 다운로드 모듈 설정
        if (mod.type === 'file_download') {
          html += `
            <div class="form-group">
              <label class="form-label">다운로드용 표시 파일명</label>
              <input type="text" class="form-control" id="edit-file-name" value="${mod.fileName || ''}">
            </div>
            <div class="form-group">
              <label class="form-label">파일 등록 (HWP, PDF, ZIP 등)</label>
              <input type="file" class="form-control" id="edit-doc-file">
              ${mod.fileData ? `<div style="font-size:0.75rem; color:var(--color-success); margin-top:0.5rem;">✔️ 파일이 업로드되어 있습니다.</div>` : ''}
            </div>
          `;
        }

        if (mod.type === 'single_select' || mod.type === 'checkbox' || mod.type === 'dropdown') {
          const opts = mod.options || [];
          html += `
            <div class="form-group">
              <label class="form-label">옵션 값 리스트</label>
              <div style="display:flex; flex-direction:column; gap:0.5rem;" id="opts-box">
                ${opts.map((opt, oIdx) => `
                  <div style="display:flex; gap:0.25rem;">
                    <input type="text" class="form-control opt-in" data-idx="${oIdx}" value="${opt}">
                    <button class="btn btn-secondary btn-del-opt" data-idx="${oIdx}" style="padding:0.55rem; color:var(--color-danger);">×</button>
                  </div>
                `).join('')}
              </div>
              <button class="btn btn-outline btn-sm" id="btn-add-opt" style="width:100%; margin-top:0.75rem;">+ 옵션 추가</button>
            </div>
          `;
        }

        this.sidebar.innerHTML = html;

        this.sidebar.querySelector('#edit-lbl').addEventListener('input', (e) => {
          mod.label = e.target.value; this.refreshCanvas();
        });

        const req = this.sidebar.querySelector('#edit-req');
        if (req) req.addEventListener('change', (e) => { mod.required = e.target.checked; this.refreshCanvas(); });

        const ph = this.sidebar.querySelector('#edit-ph');
        if (ph) ph.addEventListener('input', (e) => mod.placeholder = e.target.value);

        // 이미지 파일 변화 리스너
        const imgFile = this.sidebar.querySelector('#edit-img-file');
        if (imgFile) {
          imgFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (ev) => {
                mod.src = ev.target.result;
                this.refreshCanvas(); this.refreshSidebar();
              };
              reader.readAsDataURL(file);
            }
          });
        }

        // 다운로드용 파일 변화 리스너
        const docFile = this.sidebar.querySelector('#edit-doc-file');
        const docName = this.sidebar.querySelector('#edit-file-name');
        if (docName) {
          docName.addEventListener('input', (e) => {
            mod.fileName = e.target.value;
            this.refreshCanvas();
          });
        }
        if (docFile) {
          docFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
              if (!mod.fileName) mod.fileName = file.name;
              if (docName) docName.value = mod.fileName;
              const reader = new FileReader();
              reader.onload = (ev) => {
                mod.fileData = ev.target.result;
                this.refreshCanvas(); this.refreshSidebar();
              };
              reader.readAsDataURL(file);
            }
          });
        }

        const addOpt = this.sidebar.querySelector('#btn-add-opt');
        if (addOpt) {
          addOpt.addEventListener('click', () => {
            if (!mod.options) mod.options = [];
            mod.options.push(`옵션 ${mod.options.length + 1}`);
            this.refreshCanvas(); this.refreshSidebar();
          });
          this.sidebar.querySelectorAll('.opt-in').forEach(inp => {
            inp.addEventListener('input', (e) => {
              const oIdx = Number(inp.dataset.idx);
              mod.options[oIdx] = e.target.value.trim();
              this.refreshCanvas();
            });
          });
          this.sidebar.querySelectorAll('.btn-del-opt').forEach(btn => {
            btn.addEventListener('click', () => {
              const oIdx = Number(btn.dataset.idx);
              mod.options.splice(oIdx, 1);
              this.refreshCanvas(); this.refreshSidebar();
            });
          });
        }
      }
      async save() {
        const btn = this.container.querySelector('#btn-save-builder');
        btn.disabled = true; btn.textContent = '저장 중...';
        try {
          await api.updateForm(this.trainingId, this.modules);
          showToast('양식이 성공적으로 업로드되었습니다.', 'success');
          setTimeout(() => window.location.hash = '#/admin', 1000);
        } catch(e) { showToast(e.message, 'danger'); btn.disabled = false; btn.textContent = '출석 양식 저장'; }
      }
    }

    // -------------------------------------------------------------
    // [10] 페이지 컴포넌트: ResponseView (응답 대장 대조)
    // -------------------------------------------------------------
    class ResponseView {
      constructor(container, options = {}) {
        this.container = container;
        this.trainingId = options.trainingId || null;
        this.training = null;
        this.responses = [];
        this.init();
      }
      async init() {
        try {
          this.training = await api.getForm(this.trainingId);
          this.responses = await api.getResponses(this.trainingId);
          // 시간순 정렬 (오름차순)
          this.responses.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
          this.render();
        } catch (e) { showToast(e.message, 'danger'); window.location.hash = '#/admin'; }
      }
      getRankBadge(idx) {
        if (idx === 0) return `<span class="badge" style="background-color:#fef3c7; color:#d97706; border:1px solid #fde68a; font-size:0.75rem; padding:0.15rem 0.4rem; border-radius:4px; margin-left:0.5rem; display:inline-flex; align-items:center; gap:0.25rem;">🥇 1등</span>`;
        if (idx === 1) return `<span class="badge" style="background-color:#f1f5f9; color:#475569; border:1px solid #cbd5e1; font-size:0.75rem; padding:0.15rem 0.4rem; border-radius:4px; margin-left:0.5rem; display:inline-flex; align-items:center; gap:0.25rem;">🥈 2등</span>`;
        if (idx === 2) return `<span class="badge" style="background-color:#ffedd5; color:#ea580c; border:1px solid #fed7aa; font-size:0.75rem; padding:0.15rem 0.4rem; border-radius:4px; margin-left:0.5rem; display:inline-flex; align-items:center; gap:0.25rem;">🥉 3등</span>`;
        return `<span class="badge" style="font-size:0.75rem; padding:0.15rem 0.4rem; border-radius:4px; margin-left:0.5rem; border:1px solid var(--border-color); color:var(--text-secondary); display:inline-flex; align-items:center;">${idx + 1}등</span>`;
      }
      render() {
        const shareLink = this.getShareLink();
        const activeMods = (this.training.modules || []).filter(m => m.type !== 'divider' && m.type !== 'info_text' && m.type !== 'image' && m.type !== 'file_download');

        // 부서 달성률 통계 계산 및 HTML 생성
        const participants = this.training.participants || [];
        const deptNames = participants.map(p => (p.department || '').trim()).filter(d => d !== '');
        const uniqueDepts = [...new Set(deptNames)];
        const showDeptRanking = uniqueDepts.length > 1;

        let deptRankingHtml = '';
        if (showDeptRanking) {
          const attendedNames = new Set(this.responses.map(r => r.name.trim()));
          const deptStats = uniqueDepts.map(dept => {
            const targetCount = participants.filter(p => (p.department || '').trim() === dept).length;
            const attendedCount = participants.filter(p => (p.department || '').trim() === dept && attendedNames.has(p.name.trim())).length;
            const rate = targetCount > 0 ? (attendedCount / targetCount) * 100 : 0;
            return { dept, targetCount, attendedCount, rate };
          });

          // 달성률 내림차순, 동일 시 인원수 많은 순 정렬
          deptStats.sort((a, b) => b.rate - a.rate || b.targetCount - a.targetCount);

          deptRankingHtml = `
            <div class="card" style="margin-bottom: 2rem; padding: 1.5rem;">
              <h3 style="font-size:1.1rem; font-weight:700; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;">
                📊 부서별 출석 달성률 랭킹
              </h3>
              <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:1rem;">
                ${deptStats.map((stat, idx) => {
                  const medal = idx === 0 ? '🏆' : (idx === 1 ? '🥈' : (idx === 2 ? '🥉' : '👏'));
                  const pct = stat.rate.toFixed(1);
                  return `
                    <div style="background-color:var(--bg-primary); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1rem; display:flex; flex-direction:column; gap:0.5rem; position:relative; overflow:hidden;">
                      <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:700; font-size:1rem;">${medal} ${idx + 1}위. ${stat.dept}</span>
                        <span style="font-weight:800; color:var(--color-primary);">${pct}%</span>
                      </div>
                      <div style="width:100%; height:8px; background-color:var(--border-color); border-radius:4px; overflow:hidden;">
                        <div style="width:${pct}%; height:100%; background:linear-gradient(90deg, var(--color-primary), #8b5cf6); transition:width 0.5s ease-on-out;"></div>
                      </div>
                      <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-secondary);">
                        <span>참석 대상: ${stat.targetCount}명</span>
                        <span>실제 참석: ${stat.attendedCount}명</span>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }

        this.container.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
            <div>
              <span class="badge badge-success">출석 상태 현황</span>
              <h2 style="font-weight:700;">${this.training.title}</h2>
            </div>
            <div style="display:flex; gap:0.5rem;">
              <a href="#/admin" class="btn btn-secondary">대시보드로</a>
              <button class="btn btn-outline" id="btn-share-link">등록 링크 복사</button>
            </div>
          </div>

          <div class="card" style="margin-bottom:2rem; padding:1.25rem; border-left:4px solid var(--color-success);">
            <div style="display:flex; gap:2rem; flex-wrap:wrap; font-size:0.9rem; color:var(--text-secondary);">
              <div>📅 일시: ${this.training.date}</div>
              <div>📍 장소: ${this.training.location}</div>
              <div>👥 참석: ${this.responses.length}명</div>
            </div>
            <div style="margin-top:1rem; padding:0.5rem; background-color:var(--bg-primary); border-radius:var(--radius-sm); font-size:0.8rem; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border-color);">
              <span style="font-family:monospace; text-overflow:ellipsis; overflow:hidden;">${shareLink}</span>
              <span style="color:var(--color-primary); font-weight:600; cursor:pointer;" id="txt-share-copy">복사</span>
            </div>
          </div>

          ${deptRankingHtml}

          <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-bottom:1rem;">
            <button class="btn btn-secondary btn-sm" id="btn-csv" ${this.responses.length === 0 ? 'disabled' : ''}>CSV 내보내기</button>
            <button class="btn btn-primary btn-sm" id="btn-pdf-settings" ${this.responses.length === 0 ? 'disabled' : ''}>인쇄용 PDF 출력</button>
          </div>

          ${this.responses.length === 0 ? `
            <div class="card" style="text-align:center; padding:4rem;">
              <p>아직 수집된 응답이 없습니다.</p>
            </div>
          ` : `
            <div class="table-responsive">
              <table class="table">
                <thead>
                  <tr>
                    <th>No</th><th>등록 일시</th><th>성명</th>
                    ${activeMods.map(m => `<th>${m.label}</th>`).join('')}
                  </tr>
                </thead>
                <tbody>
                  ${this.responses.map((resp, idx) => `
                    <tr>
                      <td style="text-align:center;">${idx + 1}</td>
                      <td style="font-size:0.8rem;">${this.fmtDate(resp.timestamp)}</td>
                      <td style="font-weight:700;">
                        <div style="display:inline-flex; align-items:center;">
                          ${resp.name}${this.getRankBadge(idx)}
                        </div>
                      </td>
                      ${activeMods.map(m => `<td>${this.renderVal(m.type, resp.responses[m.id])}</td>`).join('')}
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `}

          <!-- [4-2] PDF 인쇄용 세부 설정 모달 설계 -->
          <div class="modal-overlay" id="pdf-settings-modal" style="display:none;">
            <div class="modal-container" style="max-width:460px;">
              <div class="modal-header">
                <h3 class="modal-title">PDF 인쇄 상세 옵션</h3>
                <button class="modal-close" id="btn-pdf-modal-close">&times;</button>
              </div>
              <div class="modal-body">
                <!-- 한글 폰트 등록 섹션 (행정망/로컬 전용) -->
                <div class="card" style="padding:1rem; margin-bottom:1.25rem; background-color:var(--bg-primary); border:1px solid var(--border-color); box-shadow:none;">
                  <h4 style="font-size:0.875rem; font-weight:700; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center;">
                    <span>🔤 로컬 한글 폰트 캐시</span>
                    <span id="font-status-badge" class="badge" style="font-size:0.75rem; padding:0.15rem 0.4rem; border-radius:4px;">조회 중...</span>
                  </h4>
                  <p style="font-size:0.75rem; color:var(--text-secondary); margin-bottom:0.75rem; line-height:1.4;">
                    행정망 내부나 로컬 파일 실행(file://) 환경에서는 한글 폰트 다운로드가 제한될 수 있습니다. 폴더 안에 있는 <b>KoPubWorld Batang 폰트(.ttf)</b> 파일을 아래에 등록해주시면 오프라인에서도 한글 PDF 출력이 영구히 지원됩니다.
                  </p>
                  <div style="display:flex; gap:0.5rem; align-items:center;">
                    <input type="file" id="font-file-input" accept=".ttf" style="display:none;">
                    <button type="button" class="btn btn-secondary btn-sm" id="btn-font-file-select" style="flex:1;">폰트 파일 등록 (.ttf)</button>
                    <button type="button" class="btn btn-outline btn-sm" id="btn-font-cache-clear" style="color:var(--color-danger); display:none;">삭제</button>
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label" style="margin-bottom:0.75rem;">출력할 컬럼 선택</label>
                  <div class="checkbox-group" id="pdf-cols-checks" style="max-height:160px; overflow-y:auto; border:1px solid var(--border-color); padding:0.75rem; border-radius:var(--radius-sm);">
                    <label class="option-control"><input type="checkbox" value="index" checked> 번호 (연번)</label>
                    <label class="option-control"><input type="checkbox" value="timestamp" checked> 등록일시</label>
                    <label class="option-control"><input type="checkbox" value="name" checked> 성명</label>
                    ${activeMods.map(m => `
                      <label class="option-control"><input type="checkbox" value="${m.id}" checked> ${m.label}</label>
                    `).join('')}
                  </div>
                </div>
                <div class="form-group" style="margin-top:1.25rem;">
                  <label class="form-label" for="pdf-rows-per-page">페이지당 행(줄) 수 지정</label>
                  <select class="form-select" id="pdf-rows-per-page">
                    <option value="0">제한 없음 (기본 자동 배분)</option>
                    <option value="5">5행 배치 (넉넉하게)</option>
                    <option value="10" selected>10행 배치 (표준 양식형)</option>
                    <option value="15">15행 배치</option>
                    <option value="20">20행 배치 (오밀조밀)</option>
                    <option value="30">30행 배치 (초고밀도)</option>
                  </select>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btn-pdf-modal-cancel">취소</button>
                <button type="button" class="btn btn-primary" id="btn-pdf-modal-start">출력 시작</button>
              </div>
            </div>
          </div>

          <div id="loading-overlay" class="modal-overlay" style="display:none;">
            <div class="card" style="max-width:300px; text-align:center; padding:2rem;">
              <h4 style="margin-bottom:0.5rem;">PDF 생성 작업 중</h4>
              <p id="loading-msg" style="font-size:0.85rem; color:var(--text-secondary);">폰트 다운로드 대기 중...</p>
            </div>
          </div>
        `;
        this.bindEvents();
      }
      fmtDate(iso) {
        if(!iso) return '';
        const d = new Date(iso);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      }
      renderVal(type, val) {
        if (val === undefined || val === null) return '';
        if (type === 'signature') {
          if (val.startsWith('data:image/')) {
            return `<img src="${val}" height="32" style="border:1px solid var(--border-color); background:#fafbfc; border-radius:4px; max-width:85px; object-fit:contain; display:block;" alt="서명">`;
          }
          return '<span style="color:var(--text-muted);">[서명 누락]</span>';
        }
        if (type === 'file_upload') {
          if (val && typeof val === 'object' && val.base64 && val.filename) {
            // 로컬 Mock 저장본 (다운로드 링크 생성)
            return `<a href="${val.base64}" download="${val.filename}" style="font-size:0.8rem; color:var(--color-primary); font-weight:600;">📁 ${val.filename}</a>`;
          } else if (val && (val.startsWith('http://') || val.startsWith('https://'))) {
            // 구글 드라이브 업로드 저장본 링크
            return `<a href="${val}" target="_blank" style="font-size:0.8rem; color:var(--color-primary); font-weight:600;">📁 파일 열기 (드라이브)</a>`;
          }
          return `<span style="color:var(--text-muted); font-size:0.8rem;">${val}</span>`;
        }
        return Array.isArray(val) ? val.join(', ') : String(val);
      }
      getShareLink() {
        const loc = window.location;
        const base = loc.href.split('#')[0];
        return `${base}#/user?id=${this.trainingId}`;
      }
      bindEvents() {
        const link = this.getShareLink();
        const copy = () => {
          navigator.clipboard.writeText(link)
            .then(() => showToast('공유 링크가 복사되었습니다.', 'success'))
            .catch(() => showToast('복사 실패', 'danger'));
        };
        this.container.querySelector('#btn-share-link').addEventListener('click', copy);
        this.container.querySelector('#txt-share-copy').addEventListener('click', copy);

        const csv = this.container.querySelector('#btn-csv');
        if (csv) {
          csv.addEventListener('click', () => {
            const hdrs = ['연번', '제출시간', '이름'];
            const activeMods = (this.training.modules || []).filter(m => m.type !== 'divider' && m.type !== 'info_text' && m.type !== 'image' && m.type !== 'file_download');
            activeMods.forEach(m => hdrs.push(m.label));

            const rows = this.responses.map((resp, idx) => {
              const row = [String(idx + 1), this.fmtDate(resp.timestamp), resp.name];
              activeMods.forEach(m => {
                const val = resp.responses[m.id];
                if (m.type === 'file_upload' && val && typeof val === 'object') {
                  row.push(val.filename || '');
                } else {
                  row.push(val);
                }
              });
              return row;
            });
            exportToCSV(`출석대장_${this.training.title.replace(/[\\/:*?"<>|]/g, '_')}.csv`, hdrs, rows);
            showToast('다운로드가 완료되었습니다.', 'success');
          });
        }

        // PDF 인쇄 모달 제어 바인딩
        const pdfSettingsBtn = this.container.querySelector('#btn-pdf-settings');
        const pdfModal = this.container.querySelector('#pdf-settings-modal');
        const pdfModalClose = this.container.querySelector('#btn-pdf-modal-close');
        const pdfModalCancel = this.container.querySelector('#btn-pdf-modal-cancel');
        const pdfModalStart = this.container.querySelector('#btn-pdf-modal-start');

        // 로컬 폰트 캐시 상태 UI 제어 바인딩
        const updateFontStatus = async () => {
          const badge = pdfModal.querySelector('#font-status-badge');
          const clearBtn = pdfModal.querySelector('#btn-font-cache-clear');
          try {
            const cached = await FontCacheDB.get();
            if (cached) {
              badge.className = 'badge';
              badge.textContent = '등록 완료';
              badge.style.backgroundColor = 'var(--color-success-light)';
              badge.style.color = 'var(--color-success)';
              badge.style.border = '1px solid var(--color-success)';
              clearBtn.style.display = 'inline-block';
            } else {
              badge.className = 'badge';
              badge.textContent = '미등록';
              badge.style.backgroundColor = 'var(--color-danger-light)';
              badge.style.color = 'var(--color-danger)';
              badge.style.border = '1px solid var(--color-danger)';
              clearBtn.style.display = 'none';
            }
          } catch {
            badge.className = 'badge';
            badge.textContent = '확인 불가';
            clearBtn.style.display = 'none';
          }
        };

        if (pdfSettingsBtn) {
          pdfSettingsBtn.addEventListener('click', async () => {
            await updateFontStatus();
            pdfModal.style.display = 'flex';
          });
        }
        
        const closePdfModal = () => pdfModal.style.display = 'none';
        if (pdfModalClose) pdfModalClose.addEventListener('click', closePdfModal);
        if (pdfModalCancel) pdfModalCancel.addEventListener('click', closePdfModal);

        // 폰트 선택 & 삭제 리스너 추가
        const fileInput = pdfModal.querySelector('#font-file-input');
        const selectBtn = pdfModal.querySelector('#btn-font-file-select');
        const clearBtn = pdfModal.querySelector('#btn-font-cache-clear');

        if (selectBtn) {
          selectBtn.addEventListener('click', () => fileInput.click());
        }

        if (fileInput) {
          fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.name.endsWith('.ttf')) {
              showToast('TTF 형식의 폰트 파일만 등록할 수 있습니다.', 'danger');
              return;
            }
            
            const progressOverlay = this.container.querySelector('#loading-overlay');
            const progressMsg = this.container.querySelector('#loading-msg');
            progressMsg.textContent = '폰트 등록 중...';
            progressOverlay.style.display = 'flex';
            
            try {
              const reader = new FileReader();
              const base64 = await new Promise((resolve, reject) => {
                reader.onloadend = () => {
                  const result = reader.result;
                  const base64Str = result.substring(result.indexOf(',') + 1);
                  resolve(base64Str);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
              });
              
              await FontCacheDB.save(base64);
              cachedFontBase64 = base64; // 전역 캐시 업데이트
              showToast(`폰트가 등록되었습니다: ${file.name}`, 'success');
              await updateFontStatus();
            } catch (err) {
              showToast('폰트 파일 읽기 및 저장에 실패했습니다: ' + err.message, 'danger');
            } finally {
              progressOverlay.style.display = 'none';
              fileInput.value = '';
            }
          });
        }

        if (clearBtn) {
          clearBtn.addEventListener('click', async () => {
            if (confirm('등록된 폰트 캐시를 삭제하시겠습니까?')) {
              try {
                await FontCacheDB.remove();
                cachedFontBase64 = null;
                showToast('폰트 캐시가 삭제되었습니다.', 'warning');
                await updateFontStatus();
              } catch (err) {
                showToast('삭제 실패: ' + err.message, 'danger');
              }
            }
          });
        }

        if (pdfModalStart) {
          pdfModalStart.addEventListener('click', async () => {
            closePdfModal();
            const ovr = this.container.querySelector('#loading-overlay');
            const msg = this.container.querySelector('#loading-msg');
            ovr.style.display = 'flex';

            // 선택된 인쇄 컬럼 목록 수집
            const checks = this.container.querySelectorAll('#pdf-cols-checks input[type="checkbox"]:checked');
            const selectedColumns = Array.from(checks).map(cb => cb.value);

            // 한 페이지 행 지정 수 수집
            const rowsPerPage = Number(this.container.querySelector('#pdf-rows-per-page').value);

            try {
              await exportToPDF(this.training, this.responses, (p) => { if(p) msg.textContent = p; }, {
                selectedColumns,
                rowsPerPage
              });
              showToast('PDF 인쇄가 완료되었습니다.', 'success');
            } catch(err) { showToast(err.message, 'danger'); }
            finally { ovr.style.display = 'none'; }
          });
        }
      }
    }

    const MODULE_TYPES = [
      { type: 'signature', name: '✍ 자필 서명' },
      { type: 'short_text', name: '📝 단답형 텍스트' },
      { type: 'long_text', name: '📋 장문형 텍스트' },
      { type: 'number', name: '🔢 숫자 입력' },
      { type: 'single_select', name: '🔘 단일 선택 (라디오)' },
      { type: 'checkbox', name: '☑ 복수 선택 (체크)' },
      { type: 'dropdown', name: '▼ 드롭다운 선택' },
      { type: 'date', name: '📅 날짜 선택' },
      { type: 'time', name: '⏰ 시간 입력' },
      { type: 'image', name: '🖼 안내용 이미지 삽입' },
      { type: 'file_download', name: '📥 안내 첨부파일 제공' },
      { type: 'file_upload', name: '📎 증빙서류 첨부 업로드' },
      { type: 'divider', name: '― 구분선 섹션' },
      { type: 'info_text', name: 'ℹ 안내 텍스트' }
    ];

    // -------------------------------------------------------------
    // [11] 해시 기반 라우터 및 테마 초기화
    // -------------------------------------------------------------
    function renderHeader() {
      const h = document.createElement('header');
      h.className = 'header';
      h.innerHTML = `
        <div class="header-container">
          <a href="#/" class="logo"><div class="logo-icon">✍</div>모두의 연수등록부</a>
          <div class="nav-links">
            <a href="#/" class="nav-link" id="n-usr">참여자 등록</a>
            <a href="#/admin" class="nav-link" id="n-adm">관리 대시보드</a>
            <button id="theme-btn" class="theme-toggle" aria-label="테마"></button>
          </div>
        </div>
      `;
      document.getElementById('app').appendChild(h);
      document.getElementById('theme-btn').addEventListener('click', toggleTheme);
    }

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme') || 'light';
      const next = cur === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('everyone_register_theme', next);
      updateThemeIcon(next);
    }

    function updateThemeIcon(theme) {
      const btn = document.getElementById('theme-btn');
      if (!btn) return;
      if (theme === 'dark') {
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
      } else {
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
      }
    }

    function updateActiveNav(hash) {
      const u = document.getElementById('n-usr');
      const a = document.getElementById('n-adm');
      if (!u || !a) return;
      u.classList.remove('active'); a.classList.remove('active');
      if (hash === '#/' || hash === '' || hash.startsWith('#/user')) u.classList.add('active');
      else a.classList.add('active');
    }

    function router() {
      const app = document.getElementById('app');
      let main = app.querySelector('.main-content');
      if (!main) {
        main = document.createElement('main'); main.className = 'main-content';
        app.appendChild(main);
      }
      const hash = window.location.hash || '#/';
      updateActiveNav(hash);

      if (hash === '#/' || hash === '' || hash.startsWith('#/user')) {
        const q = hash.includes('?') ? hash.split('?')[1] : '';
        const params = new URLSearchParams(q);
        new UserPage(main, { trainingId: params.get('id') });
      } else if (hash === '#/admin') {
        new AdminPage(main);
      } else if (hash.startsWith('#/builder')) {
        const q = hash.includes('?') ? hash.split('?')[1] : '';
        const params = new URLSearchParams(q);
        new FormBuilder(main, { trainingId: params.get('id') });
      } else if (hash.startsWith('#/responses/')) {
        const id = hash.split('/')[2];
        new ResponseView(main, { trainingId: id });
      } else {
        main.innerHTML = `<div class="card" style="text-align:center; max-width:400px; margin:4rem auto;"><h2>404 Not Found</h2></div>`;
      }
    }

    function initApp() {
      document.getElementById('app').innerHTML = '';
      renderHeader();
      const savedTheme = localStorage.getItem('everyone_register_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);
      
      window.addEventListener('hashchange', router);
      router();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>
</body>
</html>
