<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모두의 연수등록부</title>
  <!-- Google Fonts 로드: 프리미엄 타이포그래피 구현 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- 외부 라이브러리 CDN 로드 (글로벌 jspdf 객체 바인딩 사용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- 프리미엄 디자인 시스템 스타일시트 -->
  <style>
    :root {
      --font-sans: 'Outfit', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      
      --color-primary: #4f46e5;       /* Deep Indigo */
      --color-primary-hover: #4338ca;
      --color-primary-light: #e0e7ff;
      
      --color-success: #10b981;       /* Emerald Green */
      --color-success-hover: #059669;
      --color-success-light: #d1fae5;
      
      --color-danger: #ef4444;        /* Rose Red */
      --color-danger-hover: #dc2626;
      --color-danger-light: #fee2e2;
      
      --color-warning: #f59e0b;       /* Amber Gold */
      --color-warning-hover: #d97706;
      --color-warning-light: #fef3c7;
      
      --border-color: #e2e8f0;
      --border-focus: #a5b4fc;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      --shadow-premium: 0 20px 25px -5px rgba(79, 70, 229, 0.08), 0 8px 10px -6px rgba(79, 70, 229, 0.08);
      
      --radius-sm: 0.375rem;
      --radius-md: 0.75rem;
      --radius-lg: 1.25rem;
      --radius-full: 9999px;
      
      --transition-fast: 0.15s ease;
      --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-blur: 12px;
    }

    [data-theme="dark"] {
      --bg-primary: #0b0f19;
      --bg-secondary: #161e2e;
      --bg-tertiary: #1f293d;
      
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --color-primary-light: #2d2f5c;
      
      --border-color: #2a3447;
      --border-focus: #6366f1;
      
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
      --shadow-premium: 0 20px 25px -5px rgba(99, 102, 241, 0.15), 0 8px 10px -6px rgba(99, 102, 241, 0.15);
      
      --glass-bg: rgba(22, 30, 46, 0.85);
      --glass-border: rgba(255, 255, 255, 0.05);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background-color var(--transition-normal), color var(--transition-normal);
      overflow-x: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border-color);
      transition: background-color var(--transition-normal), border-color var(--transition-normal);
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-primary);
      text-decoration: none;
      letter-spacing: -0.025em;
    }

    .logo-icon {
      background: linear-gradient(135deg, var(--color-primary), #8b5cf6);
      color: white;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.125rem;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      transition: all var(--transition-fast);
    }

    .nav-link:hover {
      color: var(--color-primary);
      background-color: var(--bg-tertiary);
    }

    .nav-link.active {
      color: var(--color-primary);
      background-color: var(--color-primary-light);
      font-weight: 600;
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color var(--transition-fast);
    }

    .theme-toggle:hover {
      background-color: var(--bg-tertiary);
      color: var(--color-primary);
    }

    .main-content {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      animation: fadeIn var(--transition-normal);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-md);
      transition: all var(--transition-normal);
    }

    .card:hover {
      box-shadow: var(--shadow-premium);
      border-color: var(--border-focus);
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .card-subtitle {
      font-size: 0.925rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      white-space: pre-wrap; /* 여러 줄 약관/설명 대응 */
      word-break: keep-all; /* 모바일 줄바꿈 가독성 개선 */
    }

    .form-label .required {
      color: var(--color-danger);
      margin-left: 0.25rem;
    }

    .form-control, .form-select {
      width: 100%;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 100px;
    }

    .checkbox-group, .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      margin-top: 0.5rem;
    }

    .option-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
      color: var(--text-secondary);
    }

    .option-control input[type="checkbox"],
    .option-control input[type="radio"] {
      appearance: none;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      width: 1.25rem;
      height: 1.25rem;
      border-radius: var(--radius-sm);
      display: grid;
      place-content: center;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .option-control input[type="radio"] {
      border-radius: var(--radius-full);
    }

    .option-control input[type="checkbox"]::before,
    .option-control input[type="radio"]::before {
      content: "";
      width: 0.625rem;
      height: 0.625rem;
      transform: scale(0);
      transition: transform var(--transition-fast);
      box-shadow: inset 1em 1em var(--color-primary);
    }

    .option-control input[type="checkbox"]::before {
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    .option-control input[type="radio"]::before {
      border-radius: var(--radius-full);
    }

    .option-control input:checked {
      border-color: var(--color-primary);
      background-color: var(--color-primary-light);
    }

    .option-control input:checked::before {
      transform: scale(1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      cursor: pointer;
      user-select: none;
      transition: all var(--transition-fast);
      text-decoration: none;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: white;
      box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
    }

    .btn-primary:hover {
      background-color: var(--color-primary-hover);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
    }

    .btn-secondary {
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--border-color);
    }

    .btn-secondary:hover {
      background-color: var(--border-color);
    }

    .btn-danger {
      background-color: var(--color-danger);
      color: white;
    }

    .btn-danger:hover {
      background-color: var(--color-danger-hover);
    }

    .btn-outline {
      background-color: transparent;
      border-color: var(--border-color);
      color: var(--text-secondary);
    }

    .btn-outline:hover {
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .btn-sm { font-size: 0.85rem; padding: 0.4rem 0.8rem; border-radius: var(--radius-sm); }
    .btn-lg { font-size: 1.05rem; padding: 0.85rem 1.75rem; border-radius: var(--radius-lg); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .table-responsive {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background-color: var(--bg-secondary);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.9rem;
    }

    .table th, .table td {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap; /* 모바일 셀 텍스트 줄바꿈 방지 */
    }

    .table th {
      background-color: var(--bg-tertiary);
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .table tbody tr:hover {
      background-color: var(--bg-primary);
    }

    .signature-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 500px;
    }

    .signature-canvas-wrapper {
      position: relative;
      background-color: #fafbfc;
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: crosshair;
    }

    [data-theme="dark"] .signature-canvas-wrapper {
      background-color: #1a2233;
    }

    .signature-canvas-wrapper.active {
      border-color: var(--color-primary);
    }

    .signature-canvas-wrapper canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .signature-placeholder {
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      z-index: 1;
    }

    .signature-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .signature-modes {
      display: flex;
      gap: 0.5rem;
    }

    .signature-upload-btn {
      position: relative;
      overflow: hidden;
    }

    .signature-upload-btn input[type="file"] {
      position: absolute;
      top: 0;
      right: 0;
      min-width: 100%;
      min-height: 100%;
      font-size: 100px;
      text-align: right;
      filter: alpha(opacity=0);
      opacity: 0;
      outline: none;
      cursor: inherit;
      display: block;
    }

    .builder-layout {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 1.5rem;
      height: calc(100vh - 160px);
      min-height: 550px;
    }

    @media (max-width: 1024px) {
      .builder-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
    }

    .builder-panel {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .builder-panel-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .builder-palette {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
      padding-right: 0.25rem;
      flex: 1;
    }

    .palette-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      cursor: grab;
      font-size: 0.9rem;
      font-weight: 500;
      user-select: none;
      transition: all var(--transition-fast);
    }

    .palette-item:hover {
      border-color: var(--color-primary);
      background-color: var(--color-primary-light);
      color: var(--color-primary);
    }

    .builder-canvas-scroll {
      flex: 1;
      overflow-y: auto;
      background-color: var(--bg-primary);
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transition: border-color var(--transition-fast);
    }

    .builder-canvas-scroll.dragover {
      border-color: var(--color-primary);
      background-color: var(--color-primary-light);
      opacity: 0.85;
    }

    .canvas-empty-state {
      margin: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 300px;
    }

    .builder-item {
      position: relative;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .builder-item:hover, .builder-item.selected {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-md);
    }

    .builder-item.selected {
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .builder-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }

    .builder-item-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-primary);
      letter-spacing: 0.05em;
    }

    .builder-item-actions {
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .builder-item:hover .builder-item-actions {
      opacity: 1;
    }

    .builder-item-content {
      pointer-events: none;
      opacity: 0.85;
    }

    .builder-settings {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
      flex: 1;
    }

    .settings-empty {
      margin: auto;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      z-index: 999;
    }

    .toast {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--color-primary);
      border-radius: var(--radius-md);
      padding: 0.85rem 1.25rem;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
      font-weight: 500;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      min-width: 280px;
    }

    .toast-success { border-left-color: var(--color-success); }
    .toast-danger { border-left-color: var(--color-danger); }
    .toast-warning { border-left-color: var(--color-warning); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1.1;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .training-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .training-meta {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      margin: 1rem 0 1.5rem 0;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .training-actions {
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid var(--border-color);
      padding-top: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-primary { background-color: var(--color-primary-light); color: var(--color-primary); }
    .badge-success { background-color: var(--color-success-light); color: var(--color-success); }
    .badge-danger { background-color: var(--color-danger-light); color: var(--color-danger); }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }

    .modal-container {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: fadeIn 0.25s ease;
    }

    .modal-header {

    const FontCacheDB = {
      DB_NAME: 'EveryoneRegisterFontDB',
      STORE_NAME: 'fonts',
      FONT_KEY: 'KoPubWorldBatang',
      
      open() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(this.DB_NAME, 1);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result);
          request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(this.STORE_NAME)) {
              db.createObjectStore(this.STORE_NAME);
            }
          };
        });
      },
      
      async save(base64) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(this.STORE_NAME, 'readwrite');
          const store = transaction.objectStore(this.STORE_NAME);
          const request = store.put(base64, this.FONT_KEY);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(true);
        });
      },
      
      async get() {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(this.STORE_NAME, 'readonly');
          const store = transaction.objectStore(this.STORE_NAME);
          const request = store.get(this.FONT_KEY);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result || null);
        });
      },

      async remove() {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(this.STORE_NAME, 'readwrite');
          const store = transaction.objectStore(this.STORE_NAME);
          const request = store.delete(this.FONT_KEY);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(true);
        });
      }

    const api = {
      async _request(action, payload = {}) {
        if (config.isMockMode()) {
          return this._mockRequest(action, payload);
        }
        const gasUrl = config.getGasUrl();
        try {
          const response = await fetch(gasUrl, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, ...payload })
          });
          const data = await response.json();
          if (data.status === 'error') throw new Error(data.message);
          return data.data;
        } catch (error) {
          console.error(`GAS API Error (${action}):`, error);
          throw error;
        }
      },

      _mockRequest(action, payload) {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            try {
              const trainingsKey = 'everyone_register_trainings';
              let trainings = JSON.parse(localStorage.getItem(trainingsKey) || '[]');

              switch (action) {
                case 'adminLogin':
                  const savedPw = localStorage.getItem('everyone_register_admin_pw') || '1234';

                    const token = 'mock_token_' + Math.random().toString(36).substring(2);

                    resolve({ success: true, token });
                  } else {
                    reject(new Error('비밀번호가 일치하지 않습니다.'));
                  }
                  break;
                case 'getTrainings':
                  resolve(trainings);
                  break;
                case 'getForm':
                  const tr = trainings.find(t => t.id === payload.id);
                  if (tr) resolve(tr);
                  else reject(new Error('연수를 찾을 수 없습니다.'));
                  break;
                case 'createTraining':
                  const newId = 'tr_' + Date.now();
                  const newTr = {
                    id: newId,
                    title: payload.title,
                    date: payload.date,
                    location: payload.location,
                    modules: payload.modules || [],
                    participants: payload.participants || [],
                    createdAt: new Date().toISOString()
                  };
                  trainings.unshift(newTr);
                  localStorage.setItem(trainingsKey, JSON.stringify(trainings));
                  resolve(newTr);
                  break;
                case 'updateForm':
                  const idx = trainings.findIndex(t => t.id === payload.id);
                  if (idx !== -1) {
                    trainings[idx].modules = payload.modules;
                    localStorage.setItem(trainingsKey, JSON.stringify(trainings));
                    resolve(trainings[idx]);
                  } else reject(new Error('연수를 찾을 수 없습니다.'));
                  break;
                case 'updateTraining':
                  const idxTr = trainings.findIndex(t => t.id === payload.id);
                  if (idxTr !== -1) {
                    trainings[idxTr].title = payload.title;
                    trainings[idxTr].date = payload.date;
                    trainings[idxTr].location = payload.location;
                    trainings[idxTr].participants = payload.participants || [];
                    localStorage.setItem(trainingsKey, JSON.stringify(trainings));
                    resolve(trainings[idxTr]);
                  } else reject(new Error('연수를 찾을 수 없습니다.'));
                  break;
                case 'deleteTraining':
                  trainings = trainings.filter(t => t.id !== payload.id);
                  localStorage.setItem(trainingsKey, JSON.stringify(trainings));
                  localStorage.removeItem(`everyone_register_responses_${payload.id}`);
                  resolve({ success: true });
                  break;
                case 'submitResponse':
                  const rKey = `everyone_register_responses_${payload.trainingId}`;

    function exportToCSV(filename, headers, rows) {
      const escapeCSVField = (val) => {
        if (val === null || val === undefined) return '';
        let str = typeof val === 'object' ? JSON.stringify(val) : String(val);
        if (str.startsWith('data:image/')) return '[서명 완료]';
        if (str.includes('"') || str.includes(',') || str.includes('\n') || str.includes('\r')) {
          str = str.replace(/"/g, '""');
          return `"${str}"`;
        }
        return str;
      };
      const csvHeader = headers.map(escapeCSVField).join(',');
      const csvBody = rows.map(row => row.map(escapeCSVField).join(',')).join('\r\n');
      const csvContent = '\uFEFF' + csvHeader + '\r\n' + csvBody;

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', filename);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    let cachedFontBase64 = null;
    const FONT_URLS = [
      'https://fastly.jsdelivr.net/gh/semyo0513/Training-Registry@main/KoPubWorld%20Batang%20Medium.ttf',
      'https://raw.githubusercontent.com/semyo0513/Training-Registry/main/KoPubWorld%20Batang%20Medium.ttf',
      'https://fastly.jsdelivr.net/gh/semyo0513/Training-Registry@main/KoPubWorld%20Batang%20Bold.ttf',
      'https://raw.githubusercontent.com/semyo0513/Training-Registry/main/KoPubWorld%20Batang%20Bold.ttf',
      'https://fastly.jsdelivr.net/npm/@kfonts/nanum-gothic/fonts/NanumGothic-Regular.ttf'
    ];

    async function loadFontAsBase64(onProgress) {
      if (cachedFontBase64) return cachedFontBase64;

      // 1. IndexedDB 캐시 조회
      try {
        if (onProgress) onProgress('IndexedDB에서 로컬 폰트 조회 중...');
        const cached = await FontCacheDB.get();
        if (cached) {
          cachedFontBase64 = cached;
          return cached;
        }
      } catch (err) {
        console.warn('IndexedDB font read error:', err);
      }

      // 2. 로컬 파일/폴더 내의 KoPubWorld Batang 폰트 fetch 시도
      const localFontPaths = [
        './KoPubWorld Batang Medium.ttf',
        './KoPubWorld Batang Bold.ttf',
        './KoPubWorld Batang Light.ttf',
        './KoPubWorld_Batang_Medium.ttf'
      ];

      for (const path of localFontPaths) {
        try {
          if (onProgress) onProgress(`로컬 폰트 로드 시도 중 (${path.split('/').pop()})...`);
          const response = await fetch(path);
          if (response.ok) {
            const blob = await response.blob();
            const base64 = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => resolve(reader.result.substring(reader.result.indexOf(',') + 1));
              reader.onerror = reject;
              reader.readAsDataURL(blob);
            });
            cachedFontBase64 = base64;
            try {
              await FontCacheDB.save(base64);
            } catch (cacheErr) {
              console.warn('Failed to cache fetched font to IndexedDB:', cacheErr);
            }
            return base64;
          }
        } catch (err) {
          console.warn(`Fetch failed for local path ${path}:`, err);
        }
      }

      // 3. 기존 CDN 로드 폴백 시도
      for (let i = 0; i < FONT_URLS.length; i++) {
        try {
          if (onProgress) onProgress(`온라인 CDN 폰트 다운로드 중... (${i + 1}/${FONT_URLS.length})`);
          const response = await fetch(FONT_URLS[i]);
          if (response.ok) {
            const blob = await response.blob();
            const base64 = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => resolve(reader.result.substring(reader.result.indexOf(',') + 1));
              reader.onerror = reject;
              reader.readAsDataURL(blob);
            });
            cachedFontBase64 = base64;
            try {
              await FontCacheDB.save(base64);
            } catch (cacheErr) {
              console.warn('Failed to cache CDN font to IndexedDB:', cacheErr);
            }
            return base64;
          }
        } catch (err) { console.warn(err); }
      }

      throw new Error('폰트 로드 실패. PDF 인쇄 상세 옵션에서 폴더 내의 KoPubWorld Batang 폰트(.ttf) 파일을 등록해 주세요.');
    }

    async function exportToPDF(training, responses, onProgress, printOptions = {}) {
      const selectedColumns = printOptions.selectedColumns || [];
      const rowsPerPage = Number(printOptions.rowsPerPage || 0);

      let fontBase64 = null;
      let fontLoaded = false;
      try {
        fontBase64 = await loadFontAsBase64(onProgress);
        fontLoaded = true;
      } catch (err) {
        console.warn('Font load failed, falling back to default font:', err);
        showToast('로컬 한글 폰트 로드 및 다운로드에 실패했습니다. 기본 서체(Helvetica)로 다운로드를 진행합니다. (한글이 깨질 수 있습니다. 모달에서 직접 폰트를 업로드해주세요.)', 'warning', 6500);
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const margin = 20;

      if (fontLoaded && fontBase64) {
        doc.addFileToVFS('KoPubWorldBatang.ttf', fontBase64);
        doc.addFont('KoPubWorldBatang.ttf', 'KoPubWorldBatang', 'normal');
        doc.setFont('KoPubWorldBatang');
      }

      // 출력용 헤더 정의
      const activeModules = training.modules.filter(m => m.type !== 'divider' && m.type !== 'info_text' && m.type !== 'image' && m.type !== 'file_download');
      const columns = [];
      if (selectedColumns.includes('index')) columns.push({ header: '번호', dataKey: 'index' });
      if (selectedColumns.includes('timestamp')) columns.push({ header: '등록일시', dataKey: 'timestamp' });
      if (selectedColumns.includes('name')) columns.push({ header: '성명', dataKey: 'name' });
      
      activeModules.forEach(mod => {
        if (selectedColumns.includes(mod.id)) {
          columns.push({ header: mod.label, dataKey: mod.id });
        }
      });

      // 데이터 행 설계
      const rows = responses.map((resp, i) => {
        const row = {
          index: String(i + 1),
          timestamp: new Date(resp.timestamp).toLocaleDateString() + ' ' + new Date(resp.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
          name: resp.name
        };

        activeModules.forEach(mod => {
          const val = resp.responses[mod.id];
          if (mod.type === 'file_upload') {
            if (val && typeof val === 'object' && val.filename) {
              row[mod.id] = `[파일: ${val.filename}]`;
            } else if (val) {
              row[mod.id] = String(val); // Google Drive URL
            } else {
              row[mod.id] = '';
            }
          } else {
            row[mod.id] = val === undefined || val === null ? '' : (Array.isArray(val) ? val.join(', ') : String(val));
          }
        });
        
        return row;
      });

      // 4-1. 페이지 당 행 분할 렌더러 탑재
      if (rowsPerPage > 0) {
        const chunks = [];
        for (let i = 0; i < rows.length; i += rowsPerPage) {
          chunks.push(rows.slice(i, i + rowsPerPage));
        }

        for (let i = 0; i < chunks.length; i++) {
          if (i > 0) doc.addPage();
          
          let pageStartY = 22;
          if (i === 0) {
            // 첫 장에만 상단 정보 기재
            doc.setFontSize(18);
            doc.text('연수·협의회 출석등록부', margin, 25);
            doc.setDrawColor(79, 70, 229);
            doc.setLineWidth(0.8);
            doc.line(margin, 31, 210 - margin, 31);
            
            doc.setFontSize(9.5);
            doc.setTextColor(71, 85, 105);
            doc.text(`연 수 명 :  ${training.title}`, margin, 38);
            doc.text(`일      시 :  ${training.date}`, margin, 44);
            doc.text(`장      소 :  ${training.location}`, margin, 50);
            doc.text(`등 록 인 원 :  총 ${responses.length}명 (페이지 ${i+1}/${chunks.length})`, margin, 56);
            pageStartY = 62;
          } else {
            doc.setFontSize(8.5);
            doc.setTextColor(148, 163, 184);
            doc.text(`${training.title} - 출석대장 (페이지 ${i+1}/${chunks.length})`, margin, 15);
            doc.setDrawColor(226, 232, 240);
            doc.setLineWidth(0.2);
            doc.line(margin, 17, 210 - margin, 17);
            pageStartY = 22;
          }

          doc.autoTable({
            columns: columns,
            body: chunks[i],
            startY: pageStartY,
            margin: { left: margin, right: margin },
            styles: { font: fontLoaded ? 'KoPubWorldBatang' : 'helvetica', fontSize: 8.5, cellPadding: 3.5, valign: 'middle', lineColor: [226, 232, 240], lineWidth: 0.1 },
            headStyles: { fillColor: [79, 70, 229], textColor: [255, 255, 255], fontStyle: 'normal', halign: 'center' },
            columnStyles: { index: { width: 12, halign: 'center' }, timestamp: { width: 25, halign: 'center' }, name: { width: 20, halign: 'center' }, signature: { width: 35, halign: 'center' } },
            didDrawCell: function (data) {
              // 서명 열 렌더링
              if (data.cell.raw && String(data.cell.raw).startsWith('data:image/')) {
                const imgData = data.cell.raw;
                const cellW = data.cell.width;
                const cellH = data.cell.height;
                const p = 1.5;
                try { doc.addImage(imgData, 'PNG', data.cell.x + p, data.cell.y + p, cellW - p*2, cellH - p*2); } catch (e) { console.error(e); }
              }
            },
            willDrawCell: function (data) {
              const keys = Object.keys(data.row.cells);
              const hasSig = keys.some(k => String(data.row.cells[k].raw).startsWith('data:image/'));
              if (hasSig) data.row.height = 14;
            }
          });
        }
      } else {
        // 자동 나누기 모드
        doc.setFontSize(18);
        doc.text('연수·협의회 출석등록부', margin, 25);
        doc.setDrawColor(79, 70, 229);
        doc.setLineWidth(0.8);
        doc.line(margin, 31, 210 - margin, 31);
        
        doc.setFontSize(9.5);
        doc.setTextColor(71, 85, 105);
        doc.text(`연 수 명 :  ${training.title}`, margin, 38);
        doc.text(`일      시 :  ${training.date}`, margin, 44);
        doc.text(`장      소 :  ${training.location}`, margin, 50);
        doc.text(`등 록 인 원 :  총 ${responses.length}명`, margin, 56);

        doc.autoTable({
          columns: columns,
          body: rows,
          startY: 62,
          margin: { left: margin, right: margin },
          styles: { font: fontLoaded ? 'KoPubWorldBatang' : 'helvetica', fontSize: 8.5, cellPadding: 3.5, valign: 'middle', lineColor: [226, 232, 240], lineWidth: 0.1 },
          headStyles: { fillColor: [79, 70, 229], textColor: [255, 255, 255], fontStyle: 'normal', halign: 'center' },
          columnStyles: { index: { width: 12, halign: 'center' }, timestamp: { width: 25, halign: 'center' }, name: { width: 20, halign: 'center' }, signature: { width: 35, halign: 'center' } },
          didDrawCell: function (data) {
            if (data.cell.raw && String(data.cell.raw).startsWith('data:image/')) {
              const imgData = data.cell.raw;
              const cellW = data.cell.width;
              const cellH = data.cell.height;
              const p = 1.5;
              try { doc.addImage(imgData, 'PNG', data.cell.x + p, data.cell.y + p, cellW - p*2, cellH - p*2); } catch (e) { console.error(e); }
            }
          },
          willDrawCell: function (data) {
            const keys = Object.keys(data.row.cells);
            const hasSig = keys.some(k => String(data.row.cells[k].raw).startsWith('data:image/'));
            if (hasSig) data.row.height = 14;
          }
        });
      }

      const sanitizedTitle = training.title.replace(/[\\/:*?"<>|]/g, '_');
      doc.save(`출석등록부_${sanitizedTitle}.pdf`);
      if (onProgress) onProgress(null);
    }

    // -------------------------------------------------------------
    // [5] 자필서명 클래스 (Signature Module)
    // -------------------------------------------------------------
    class SignatureModuleInstance {
      constructor(container) {
        this.container = container;
        this.points = [];
        this.isDrawing = false;
        this.lastWidth = 2;
        this.hasDrawn = false;
        this.init();
      }
      init() {
        this.container.innerHTML = `
          <div class="signature-container">
            <div class="signature-canvas-wrapper">
              <canvas></canvas>
              <div class="signature-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m19 12-7-7-9 9c-1.25 1.25-1.25 3.28 0 4.53 1.25 1.25 3.28 1.25 4.53 0l11.5-11.5z"/><path d="m15 16-3-3"/><path d="m17 14-3-3"/><path d="m19 12-3-3"/></svg>
                <span>이곳에 서명해 주세요</span>
              </div>
            </div>
            <div class="signature-actions">
              <div class="signature-modes">
                <button type="button" class="btn btn-outline btn-sm signature-upload-btn">
                  이미지 업로드
                  <input type="file" accept="image/*" class="file-input">
                </button>
              </div>
              <button type="button" class="btn btn-secondary btn-sm clear-btn">지우기</button>
            </div>
          </div>
        `;
        this.wrapper = this.container.querySelector('.signature-canvas-wrapper');
        this.canvas = this.container.querySelector('canvas');
        this.placeholder = this.container.querySelector('.signature-placeholder');
        this.clearBtn = this.container.querySelector('.clear-btn');
        this.fileInput = this.container.querySelector('.file-input');
        
        this.ctx = this.canvas.getContext('2d');
        const rect = this.wrapper.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const w = rect.width || 450;
        const h = rect.height || 180;
        this.canvas.width = w * dpr;
        this.canvas.height = h * dpr;
        this.ctx.scale(dpr, dpr);
        this.canvas.style.width = `${w}px`;
        this.canvas.style.height = `${h}px`;

        this.ctx.strokeStyle = '#1a1a2e';
        this.ctx.lineJoin = 'round';
        this.ctx.lineCap = 'round';
        this.ctx.globalAlpha = 0.92;

        this.canvas.addEventListener('pointerdown', (e) => this.startDraw(e));
        this.canvas.addEventListener('pointermove', (e) => this.draw(e));
        this.canvas.addEventListener('pointerup', () => this.endDraw());
        this.canvas.addEventListener('pointercancel', () => this.endDraw());
        this.clearBtn.addEventListener('click', () => this.clear());
        this.fileInput.addEventListener('change', (e) => this.handleUpload(e));
      }
      startDraw(e) {
        e.preventDefault();
        this.isDrawing = true;
        this.hasDrawn = true;
        this.placeholder.style.display = 'none';
        this.wrapper.classList.add('active');
        const pos = this.getPos(e);
        this.points = [{ x: pos.x, y: pos.y, time: Date.now() }];
        this.ctx.beginPath();
        this.ctx.arc(pos.x, pos.y, 0.5, 0, 2 * Math.PI);
        this.ctx.fillStyle = '#1a1a2e';
        this.ctx.fill();
      }
      draw(e) {
        if (!this.isDrawing) return;
        e.preventDefault();
        const pos = this.getPos(e);
        const now = Date.now();
        const curr = { x: pos.x, y: pos.y, time: now };
        this.points.push(curr);

        if (this.points.length > 2) {
          const prev = this.points[this.points.length - 2];
          const dist = Math.sqrt(Math.pow(curr.x - prev.x, 2) + Math.pow(curr.y - prev.y, 2));
          const diff = curr.time - prev.time;
          const speed = diff > 0 ? dist / diff : 0;
          
          const targetW = Math.max(0.8, Math.min(3.5, 3.5 - speed * 0.25));
          const newW = this.lastWidth * 0.7 + targetW * 0.3;
          this.ctx.lineWidth = newW;
          this.lastWidth = newW;

          const p1 = this.points[this.points.length - 3];
          const p2 = this.points[this.points.length - 2];
          const p3 = this.points[this.points.length - 1];
          const midX = (p2.x + p3.x) / 2;
          const midY = (p2.y + p3.y) / 2;
          const startMidX = (p1.x + p2.x) / 2;
          const startMidY = (p1.y + p2.y) / 2;

          this.ctx.beginPath();
          this.ctx.moveTo(startMidX, startMidY);
          this.ctx.quadraticCurveTo(p2.x, p2.y, midX, midY);
          this.ctx.stroke();
        }
      }
      endDraw() { this.isDrawing = false; this.wrapper.classList.remove('active'); }
      getPos(e) {
        const rect = this.canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }
      clear() {
        this.ctx.clearRect(0, 0, this.canvas.width / (window.devicePixelRatio || 1), this.canvas.height / (window.devicePixelRatio || 1));
        this.points = [];
        this.hasDrawn = false;
        this.placeholder.style.display = 'flex';
        this.fileInput.value = '';
      }
      handleUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            this.clear();
            this.placeholder.style.display = 'none';
            this.hasDrawn = true;
            const w = this.canvas.width / (window.devicePixelRatio || 1);
            const h = this.canvas.height / (window.devicePixelRatio || 1);
            const scale = Math.min(w / img.width, h / img.height);
            const x = (w - img.width * scale) / 2;
            const y = (h - img.height * scale) / 2;
            this.ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
      getValue() { return this.hasDrawn ? this.canvas.toDataURL('image/png') : null; }
    }

    // -------------------------------------------------------------
    // [6] 모듈 렌더러
    // -------------------------------------------------------------
    function renderModule(mod, container) {
      const wrapper = document.createElement('div');
      wrapper.className = 'form-group';
      wrapper.dataset.id = mod.id;

      const showLabel = mod.type !== 'divider' && mod.type !== 'info_text' && mod.type !== 'image' && mod.type !== 'file_download';
      if (showLabel) {
        const labelEl = document.createElement('label');
        labelEl.className = 'form-label';
        labelEl.style.whiteSpace = 'pre-wrap'; // 줄바꿈 지원 활성화
        labelEl.innerHTML = `${mod.label} ${mod.required ? '<span class="required">*</span>' : ''}`;
        wrapper.appendChild(labelEl);
      }

      let getValue = () => '';
      let validate = () => mod.required && !getValue() ? `${mod.label} 필드는 필수 입력 항목입니다.` : null;

      switch (mod.type) {
        case 'short_text': {
          const input = document.createElement('input');
          input.type = 'text'; input.className = 'form-control';
          input.placeholder = mod.placeholder || '입력해 주세요';
          wrapper.appendChild(input);
          getValue = () => input.value.trim();
          break;
        }
        case 'long_text': {
          const textarea = document.createElement('textarea');
          textarea.className = 'form-control';
          textarea.placeholder = mod.placeholder || '내용을 입력해 주세요';
          textarea.rows = mod.rows || 4;
          wrapper.appendChild(textarea);
          getValue = () => textarea.value.trim();
          break;
        }
        case 'number': {
          const input = document.createElement('input');
          input.type = 'number'; input.className = 'form-control';
          input.placeholder = mod.placeholder || '숫자 입력';
          if (mod.min !== undefined && mod.min !== '') input.min = mod.min;
          if (mod.max !== undefined && mod.max !== '') input.max = mod.max;
          wrapper.appendChild(input);
          getValue = () => input.value !== '' ? Number(input.value) : '';
          validate = () => {
            if (mod.required && input.value === '') return `${mod.label} 필드는 필수 입력 항목입니다.`;
            if (input.value !== '') {
              const val = Number(input.value);
              if (mod.min !== undefined && mod.min !== '' && val < Number(mod.min)) return `${mod.label} 최소값(${mod.min}) 이상이어야 합니다.`;
              if (mod.max !== undefined && mod.max !== '' && val > Number(mod.max)) return `${mod.label} 최대값(${mod.max}) 이하여야 합니다.`;
            }
            return null;
          };
          break;
        }
        case 'date': {
          const input = document.createElement('input');
          input.type = 'date'; input.className = 'form-control';
          input.value = new Date().toISOString().split('T')[0];
          wrapper.appendChild(input);
          getValue = () => input.value;
          break;
        }
        case 'time': {
          const input = document.createElement('input');
          input.type = 'time'; input.className = 'form-control';
          const now = new Date();
          input.value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
          wrapper.appendChild(input);
          getValue = () => input.value;
          break;
        }
        case 'dropdown': {
          const select = document.createElement('select');
          select.className = 'form-select';
          const def = document.createElement('option');
          def.value = ''; def.textContent = '-- 선택해 주세요 --';
          select.appendChild(def);
          (mod.options || []).forEach(opt => {
            const o = document.createElement('option'); o.value = opt; o.textContent = opt;
            select.appendChild(o);
          });
          wrapper.appendChild(select);
          getValue = () => select.value;
          break;
        }
        case 'single_select': {
          const group = document.createElement('div'); group.className = 'radio-group';
          (mod.options || []).forEach(opt => {
            const l = document.createElement('label'); l.className = 'option-control';
            const r = document.createElement('input'); r.type = 'radio'; r.name = `radio_group_${mod.id}`; r.value = opt;
            l.appendChild(r); l.appendChild(document.createTextNode(` ${opt}`));
            group.appendChild(l);
          });
          wrapper.appendChild(group);
          getValue = () => {
            const active = group.querySelector('input[type="radio"]:checked');
            return active ? active.value : '';
          };
          break;
        }
        case 'checkbox':
        case 'multi_select': {
          const group = document.createElement('div'); group.className = 'checkbox-group';
          (mod.options || []).forEach(opt => {
            const l = document.createElement('label'); l.className = 'option-control';
            const c = document.createElement('input'); c.type = 'checkbox'; c.value = opt;
            l.appendChild(c); l.appendChild(document.createTextNode(` ${opt}`));
            group.appendChild(l);
          });
          wrapper.appendChild(group);
          getValue = () => Array.from(group.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
          validate = () => mod.required && getValue().length === 0 ? `${mod.label} 필드는 최소 1개 이상 선택해야 합니다.` : null;
          break;
        }
        case 'signature': {
          const sigDiv = document.createElement('div');
          wrapper.appendChild(sigDiv);
          let sigInst = null;
          setTimeout(() => { sigInst = new SignatureModuleInstance(sigDiv); }, 10);
          getValue = () => sigInst ? sigInst.getValue() : null;
          validate = () => {
            const val = getValue();
            return mod.required && !val ? `${mod.label} 서명이 누락되었습니다.` : null;
          };
          break;
        }
        case 'image': {
          const box = document.createElement('div');
          box.style.width = '100%';
          box.style.display = 'flex';
          box.style.flexDirection = 'column';
          box.style.gap = '0.5rem';
          if (mod.label) {
            const lbl = document.createElement('div');
            lbl.style.fontSize = '0.85rem';
            lbl.style.color = 'var(--text-secondary)';
            lbl.style.whiteSpace = 'pre-wrap';
            lbl.textContent = mod.label;
            box.appendChild(lbl);
          }
          if (mod.src) {
            const img = document.createElement('img');
            img.src = mod.src;
            img.style.maxWidth = '100%';
            img.style.height = 'auto';
            img.style.borderRadius = 'var(--radius-sm)';
            img.style.border = '1px solid var(--border-color)';
            box.appendChild(img);
          } else {
            const placeholder = document.createElement('div');
            placeholder.style.padding = '2rem';
            placeholder.style.border = '1px dashed var(--border-color)';
            placeholder.style.textAlign = 'center';
            placeholder.style.color = 'var(--text-muted)';
            placeholder.textContent = '[등록된 안내 이미지가 없습니다]';
            box.appendChild(placeholder);
          }
          wrapper.appendChild(box);
          getValue = () => '';
          validate = () => null;
          break;
        }
        case 'file_download': {
          const box = document.createElement('div');
          box.style.width = '100%';
          box.style.display = 'flex';
          box.style.flexDirection = 'column';
          box.style.gap = '0.5rem';
          if (mod.label) {
            const lbl = document.createElement('div');
            lbl.style.fontSize = '0.85rem';
            lbl.style.color = 'var(--text-secondary)';
            lbl.style.whiteSpace = 'pre-wrap';
            lbl.textContent = mod.label;
            box.appendChild(lbl);
          }
          if (mod.fileData) {
            const link = document.createElement('a');
            link.href = mod.fileData;
            link.download = mod.fileName || '첨부파일';
            link.className = 'btn btn-outline btn-sm';
            link.style.width = 'fit-content';
            link.innerHTML = `📁 ${mod.fileName || '안내 자료 다운로드'} (클릭)`;
            box.appendChild(link);
          } else {
            const placeholder = document.createElement('div');
            placeholder.style.padding = '1rem';
            placeholder.style.border = '1px dashed var(--border-color)';
            placeholder.style.textAlign = 'center';
            placeholder.style.color = 'var(--text-muted)';
            placeholder.textContent = '[등록된 안내 첨부파일이 없습니다]';
            box.appendChild(placeholder);
          }
          wrapper.appendChild(box);
          getValue = () => '';
          validate = () => null;
          break;
        }
        case 'file_upload': {
          const fileIn = document.createElement('input');
          fileIn.type = 'file';
          fileIn.className = 'form-control';
          wrapper.appendChild(fileIn);
          
          let fileBase64 = null;
          let fileName = null;
          
          fileIn.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
              fileName = file.name;
              const reader = new FileReader();
              reader.onload = (ev) => {
                fileBase64 = ev.target.result;
              };
              reader.readAsDataURL(file);
            } else {
              fileBase64 = null;
              fileName = null;
            }
          });

          getValue = () => {
            if (!fileBase64) return null;
            return { filename: fileName, base64: fileBase64 };
          };
          validate = () => {
            if (mod.required && !fileBase64) {
              return `${mod.label} 증빙서류 파일을 첨부해 주세요.`;
            }
            return null;
          };
          break;
        }
        case 'divider': {
          const div = document.createElement('div');
          div.style.marginTop = '2rem'; div.style.marginBottom = '1rem';
          if (mod.label) {
            const h = document.createElement('h3');
            h.style.fontSize = '1.05rem'; h.style.color = 'var(--color-primary)';
            h.style.whiteSpace = 'pre-wrap';
            h.textContent = mod.label; div.appendChild(h);
          }
          const hr = document.createElement('hr');
          hr.style.border = 'none'; hr.style.height = '1px'; hr.style.backgroundColor = 'var(--border-color)';
          div.appendChild(hr); wrapper.appendChild(div);
          getValue = () => ''; validate = () => null;
          break;
        }
        case 'info_text': {
          const box = document.createElement('div');
          box.style.padding = '0.9rem 1.1rem'; box.style.backgroundColor = 'var(--bg-tertiary)';
          box.style.borderLeft = '4px solid var(--color-primary)'; box.style.fontSize = '0.875rem';
          box.style.whiteSpace = 'pre-wrap'; box.textContent = mod.label || '';
          wrapper.appendChild(box);
          getValue = () => ''; validate = () => null;
          break;
        }
      }
      container.appendChild(wrapper);
      return { element: wrapper, getValue, validate };
    }

    class UserPage {

      render() {
        this.container.innerHTML = `

                </select>
              </div>
              <div id="dynamic-form-area" style="display: none;">
                <div class="form-group">
                  <label class="form-label">성명 <span class="required">*</span></label>
                  <input type="text" class="form-control" id="user-name" placeholder="이름 입력" required>
                </div>
                <div id="modules-container"></div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1.5rem;">출석부 제출</button>
              </div>
            </form>
          </div>
        `;
        this.form = this.container.querySelector('#register-form');
        this.selectGroup = this.container.querySelector('#tr-select-group');
        this.selectEl = this.container.querySelector('#tr-select');
        this.formArea = this.container.querySelector('#dynamic-form-area');
        this.nameInput = this.container.querySelector('#user-name');
        this.modulesContainer = this.container.querySelector('#modules-container');

        this.selectEl.addEventListener('change', () => this.handleTrainingChange());
        this.form.addEventListener('submit', (e) => this.handleSubmit(e));

        if (this.trainingId) {
          if (this.trainings.some(t => t.id === this.trainingId)) {
            this.selectEl.value = this.trainingId;
            this.selectGroup.style.display = 'none';
            this.handleTrainingChange();
          } else showToast('연수가 존재하지 않습니다.', 'danger');
        }
      }
      async handleTrainingChange() {
        const id = this.selectEl.value;
        if (!id) { this.formArea.style.display = 'none'; return; }
        this.formArea.style.display = 'block';
        this.modulesContainer.innerHTML = '로딩 중...';
        try {
          this.selectedTraining = await api.getForm(id);
          this.renderModules();
        } catch (e) { showToast(e.message, 'danger'); }
      }
      renderModules() {
        this.modulesContainer.innerHTML = '';
        this.renderedModules = {};
        const mods = this.selectedTraining.modules || [];
        mods.forEach(mod => {
          this.renderedModules[mod.id] = renderModule(mod, this.modulesContainer);
        });
      }
      async handleSubmit(e) {
        e.preventDefault();
        const name = this.nameInput.value.trim();
        if (!name) { showToast('성명을 기입하세요', 'danger'); return; }

        const responses = {};
        const errs = [];
        const mods = this.selectedTraining.modules || [];
        
        mods.forEach(mod => {
          if (mod.type === 'divider' || mod.type === 'info_text' || mod.type === 'image' || mod.type === 'file_download') return;
          const rend = this.renderedModules[mod.id];
          if (rend) {
            const err = rend.validate();
            if (err) errs.push(err);
            else responses[mod.id] = rend.getValue();
          }
        });

        if (errs.length > 0) { showToast(errs[0], 'danger'); return; }

        const btn = this.form.querySelector('button[type="submit"]');
        btn.disabled = true; btn.textContent = '제출 중...';

        try {
          await api.submitResponse(this.selectedTraining.id, name, responses);
          showToast('성공적으로 등록되었습니다.', 'success');
          this.renderSuccess(name);
        } catch (err) {
          showToast(err.message, 'danger');
          btn.disabled = false; btn.textContent = '출석부 제출';
        }
      }
      renderSuccess(name) {
        this.container.innerHTML = `
          <div class="card" style="max-width: 500px; margin: 3rem auto; text-align: center;">
            <h2 class="card-title">출석 등록 성공</h2>
            <p style="margin-bottom: 2rem;"><strong>${name}</strong>님의 출석 서명이 접수되었습니다.</p>
            <button class="btn btn-primary" id="btn-re">추가 대리 등록</button>
          </div>
        `;
        this.container.querySelector('#btn-re').addEventListener('click', () => {
          new UserPage(this.container, { trainingId: this.trainingId });
        });
      }
    }

            .map(line => line.trim())
            .filter(line => line.length > 0)
            .map(line => {
              const idx = line.indexOf(',');
              if (idx !== -1) {
                return {
                  name: line.substring(0, idx).trim(),
                  department: line.substring(idx + 1).trim()
                };
              }
              return { name: line, department: '' };
            });
          
          const defaultMods = [{ id: 'mod_sig_default', type: 'signature', label: '자필 서명', required: true }];
          
          try {
            const tr = await api.createTraining(title, date, location, defaultMods, participants);

            this.container.querySelector('#edit-id').value = t.id;
            this.container.querySelector('#edit-title').value = t.title || '';
            this.container.querySelector('#edit-date').value = t.date || '';
            this.container.querySelector('#edit-location').value = t.location || '';
            
            const partsText = (t.participants || []).map(p => {
              if (p.department) return `${p.name},${p.department}`;
              return p.name || '';
            }).join('\n');
            this.container.querySelector('#edit-participants').value = partsText;
            
            editModal.style.display = 'flex';
          });
        });

        this.container.querySelector('#edit-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const id = this.container.querySelector('#edit-id').value;
          const title = this.container.querySelector('#edit-title').value;
          const date = this.container.querySelector('#edit-date').value;
          const location = this.container.querySelector('#edit-location').value;
          
          const partsVal = this.container.querySelector('#edit-participants').value;
          const participants = partsVal.split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0)
            .map(line => {
              const idx = line.indexOf(',');
              if (idx !== -1) {
                return {
                  name: line.substring(0, idx).trim(),
                  department: line.substring(idx + 1).trim()
                };
              }
              return { name: line, department: '' };
            });
            
          try {
            await api.updateTraining(id, title, date, location, participants);
            showToast('연수 정보가 수정되었습니다.', 'success');
            closeEdit();
            this.init();
          } catch (err) { showToast(err.message, 'danger'); }
        });

        this.container.querySelectorAll('.btn-del').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = btn.dataset.id;
            if (confirm('이 연수 및 수집된 서명 내역을 완전히 영구 삭제할까요?')) {
              try {
                await api.deleteTraining(id);
                showToast('삭제되었습니다.', 'warning');
                this.init();
              } catch (err) { showToast(err.message, 'danger'); }
            }
          });
        });

        this.container.querySelector('#btn-save-gas').addEventListener('click', () => {
          const url = this.container.querySelector('#gas-url').value.trim();
          config.setGasUrl(url);
          showToast(url ? 'Google Apps Script 연결 완료' : '로컬 모드로 전환', 'success');
          this.init();
        });

        this.container.querySelector('#btn-reset-seed').addEventListener('click', () => {
          if (confirm('로컬 메모리를 날리고 초기 설정으로 복원하시겠습니까?')) {
            api.resetMockData();
            showToast('복원되었습니다.', 'success');
            this.init();
          }
        });
      }
    }
